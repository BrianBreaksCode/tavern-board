<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Tavern Board{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --parchment: #f4e4c1;
            --parchment-dark: #d4c4a1;
            --ink: #2c1810;
            --ink-light: #5c3a28;
            --gold: #c9a84c;
            --gold-dim: #a08030;
            --blood: #8b1a1a;
            --forest: #2d5a27;
            --shadow: rgba(44, 24, 16, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Crimson Text', Georgia, serif;
            background: #1a0f0a;
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── Parchment container ── */
        .parchment {
            max-width: 900px;
            margin: 2rem auto;
            background: var(--parchment);
            padding: 2.5rem 3rem;
            border-radius: 4px;
            box-shadow:
                0 0 30px rgba(0,0,0,0.5),
                inset 0 0 60px rgba(44, 24, 16, 0.08);
            position: relative;
        }
        .parchment::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1px solid var(--parchment-dark);
            border-radius: 2px;
            pointer-events: none;
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--ink);
        }
        header h1 {
            font-family: 'MedievalSharp', cursive;
            font-size: 2.8rem;
            color: var(--ink);
            letter-spacing: 0.04em;
        }
        header h1 span {
            color: var(--gold-dim);
        }
        header p {
            font-style: italic;
            color: var(--ink-light);
            margin-top: 0.3rem;
            font-size: 1.1rem;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        nav a {
            color: var(--ink-light);
            text-decoration: none;
            padding: 0.3rem 0.8rem;
            border: 1px solid transparent;
            font-size: 1rem;
            transition: all 0.2s;
        }
        nav a:hover, nav a.active {
            border-color: var(--gold-dim);
            color: var(--ink);
        }

        /* ── Flash messages ── */
        .flash {
            background: var(--parchment-dark);
            border-left: 4px solid var(--gold);
            padding: 0.8rem 1rem;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        /* ── Quest cards ── */
        .quest-list { display: flex; flex-direction: column; gap: 1rem; }

        .quest-card {
            border: 1px solid var(--parchment-dark);
            padding: 1.2rem 1.5rem;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
        }
        .quest-card:hover {
            border-color: var(--gold-dim);
            box-shadow: 0 2px 12px var(--shadow);
        }
        .quest-card h3 {
            font-family: 'MedievalSharp', cursive;
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
        }
        .quest-meta {
            display: flex;
            gap: 1.5rem;
            font-size: 0.95rem;
            color: var(--ink-light);
            flex-wrap: wrap;
        }
        .quest-meta .gold { color: var(--gold-dim); font-weight: 600; }
        .quest-meta .danger-low { color: var(--forest); }
        .quest-meta .danger-medium { color: var(--gold-dim); }
        .quest-meta .danger-high { color: var(--blood); }
        .quest-meta .danger-legendary { color: #6a0dad; font-weight: 600; }

        .status-badge {
            display: inline-block;
            font-size: 0.8rem;
            padding: 0.15rem 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 1px solid;
        }
        .status-open { border-color: var(--forest); color: var(--forest); }
        .status-claimed { border-color: var(--gold-dim); color: var(--gold-dim); }
        .status-completed { border-color: var(--ink-light); color: var(--ink-light); }

        /* ── Forms ── */
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            font-size: 1.05rem;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.6rem 0.8rem;
            font-family: 'Crimson Text', serif;
            font-size: 1.05rem;
            border: 1px solid var(--parchment-dark);
            background: rgba(255,255,255,0.4);
            color: var(--ink);
        }
        .form-group textarea { resize: vertical; min-height: 120px; }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--gold);
        }

        /* ── Buttons ── */
        .btn {
            display: inline-block;
            font-family: 'MedievalSharp', cursive;
            font-size: 1.1rem;
            padding: 0.5rem 1.4rem;
            border: 2px solid var(--ink);
            background: transparent;
            color: var(--ink);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn:hover {
            background: var(--ink);
            color: var(--parchment);
        }
        .btn-gold { border-color: var(--gold-dim); color: var(--gold-dim); }
        .btn-gold:hover { background: var(--gold-dim); color: var(--ink); }
        .btn-danger { border-color: var(--blood); color: var(--blood); }
        .btn-danger:hover { background: var(--blood); color: var(--parchment); }
        .btn-small { font-size: 0.95rem; padding: 0.3rem 0.9rem; }

        .btn-row { display: flex; gap: 0.8rem; margin-top: 1.5rem; flex-wrap: wrap; }

        /* ── Detail page ── */
        .quest-detail h2 {
            font-family: 'MedievalSharp', cursive;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .quest-detail .description {
            margin: 1.2rem 0;
            line-height: 1.7;
            font-size: 1.1rem;
        }

        .inline-form {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .inline-form input {
            padding: 0.35rem 0.6rem;
            font-family: 'Crimson Text', serif;
            font-size: 1rem;
            border: 1px solid var(--parchment-dark);
            background: rgba(255,255,255,0.4);
            width: 180px;
        }

        .empty-board {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--ink-light);
            font-style: italic;
            font-size: 1.2rem;
        }

        @media (max-width: 640px) {
            .parchment { margin: 1rem; padding: 1.5rem; }
            header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="parchment">
        <header>
            <h1>⚔ The <span>Tavern</span> Board ⚔</h1>
            <p>Post a quest. Claim your glory. Collect the gold.</p>
        </header>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
